[project]
name = "selffork-orchestrator"
version = "0.0.1"
description = "SelfFork Orchestrator pillar — LLM runtime, sandbox, CLI agent, plan store, lifecycle. The MVP v0 implementation lives here."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "Yamaç Bezirgan" }]
dependencies = [
    "selffork-shared",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.5.0",
    "structlog>=24.4.0",
    "typer>=0.12.0",
    "httpx>=0.27.0",
    "anyio>=4.4.0",
    "python-ulid>=3.0.0",
]

[project.scripts]
selffork = "selffork_orchestrator.cli:app"

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/selffork_orchestrator"]

[tool.uv.sources]
selffork-shared = { workspace = true }
