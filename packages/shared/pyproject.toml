[project]
name = "selffork-shared"
version = "0.0.1"
description = "Cross-pillar primitives for SelfFork: config, logging, errors, audit, ports, ulid, shellquote."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "Yamaç Bezirgan" }]
dependencies = [
    "pydantic>=2.9.0",
    "pydantic-settings>=2.5.0",
    "structlog>=24.4.0",
    "pyyaml>=6.0.2",
    "python-ulid>=3.0.0",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/selffork_shared"]
