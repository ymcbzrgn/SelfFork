[project]
name = "selffork-body"
version = "0.0.1"
description = "Body pillar — vision + cross-UI control across Android, iOS, web, desktop. Skeleton only in MVP v0; implementation lands in M5."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "SelfFork" }]
dependencies = [
    # M5 — vision adapter HTTP client (mlx_vlm + Ollama).
    "httpx>=0.27",
    # M5 — image preprocessing (preprocess + delta_image).
    "Pillow>=10.0",
    # M5 — Pydantic args validation for body action surface (shared via tools).
    "pydantic>=2.7",
]

[project.optional-dependencies]
playwright = ["playwright>=1.47"]
android = ["uiautomator2>=3.0"]
ios = ["Appium-Python-Client>=5.0"]
macos = ["pyobjc-framework-ApplicationServices>=10.0", "pyobjc-framework-Quartz>=10.0", "pyobjc-framework-AppKit>=10.0"]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/selffork_body"]
