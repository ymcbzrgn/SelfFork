# CodexBar CLI — vendored binary manifest.
#
# ADR-007 §4 S-Quota + `[[codexbar-adoption-2026-05-22]]`. The dashboard
# expects a ``codexbar`` binary on ``PATH`` (or at the resolved override
# path); ``install-codexbar.sh`` reads this manifest, downloads the
# platform-specific tarball from GitHub Releases, sha256-verifies the
# archive, and extracts the binary to ``--prefix`` (default ``/usr/local/bin``).
#
# Bumping the version: run ``scripts/refresh-codexbar-checksums.sh``
# (S-Quota Wave 2 — auto-update CI) to fetch the new sha256 values from
# the release assets, then open a PR.

[release]
# Upstream release tag (GitHub `vX.Y.Z` style). MUST match the leading
# component of the asset filenames below.
version = "v0.32.4"

# URL template — ``{platform}`` is replaced at install time with one of
# the keys under ``[platforms]``. CodexBar's release-cli.yml workflow
# publishes tarballs at this exact path.
url_template = "https://github.com/steipete/CodexBar/releases/download/{version}/CodexBarCLI-{version}-{platform}.tar.gz"

# Layout inside the tarball — the binary lives at this relative path.
#
# v0.27.0 release tarballs (CodexBarCLI-v0.27.0-<platform>.tar.gz) carry
# the real Swift binary as ``CodexBarCLI`` at the tarball root, with a
# convenience ``codexbar`` symlink pointing at it. We extract the **real
# binary** by name — extracting the symlink directly fails on tar(1)
# because the target is not pulled along (BUG-2, 2026-05-26).
#
# install-codexbar.sh also has a fallback that scans the extracted tree
# by basename, so older / future tarballs that wrap the binary in a
# subdirectory still work without a manifest bump.
archive_member = "CodexBarCLI"

# Optional companion checksum file in the release assets (some releases
# include one; install-codexbar.sh prefers explicit per-platform sha256
# below, but falls back to this when set).
checksums_asset = ""


# Per-platform sha256 of the tarball. The shasum command writes lower-case
# hex; we store them verbatim. Empty strings mean "not yet pinned" — the
# install script then refuses to proceed unless the operator passes
# ``--no-verify`` (NEVER acceptable in production).
#
# Refresh with ``scripts/refresh-codexbar-checksums.sh v0.27.0`` (S-Quota
# Wave 2). The Dockerfile build fails closed when an empty entry is hit.

[platforms.linux-x86_64]
sha256 = "cb0731e5951a458b394e51b281e3b74249eaab96d15891f2122cd085228a2279"

[platforms.linux-aarch64]
sha256 = "7a113a60603d0f268044cb333d0fa31a27d475e98b5055b6c564b665e1471173"

[platforms.macos-arm64]
sha256 = "1d8aab67ebbaa4518803ba8a2911b31be577a3518f10b1d913cf893bb7546765"

[platforms.macos-x86_64]
sha256 = "8fc964621c9712ef4bd176c57271194577b3a3c2ec34363fd88ba78f21ddeda5"
